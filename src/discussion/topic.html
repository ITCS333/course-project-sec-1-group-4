<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Details</title>

    <link rel="stylesheet" href="../common/styles.css">

    <script src="topic.js" defer></script>
</head>
<body>

    <header>
        <h1 id="topic-subject"></h1>
        <nav>
            <a href="board.html">← Back to Discussion Board</a>
        </nav>
    </header>

    <main>
        <article id="original-post">
            <p id="op-message"></p>
            <footer id="op-footer"></footer>
            <div id="op-actions"></div>
        </article>

        <section id="replies-section">
            <h2>Replies</h2>
            <div id="reply-list-container">
            </div>
            <hr>

            <form id="reply-form" action="#">
                <fieldset>
                    <legend>Your Reply</legend>

                    <label for="new-reply">Message:</label>
                    <textarea id="new-reply" rows="5" required placeholder="Type your reply here..."></textarea>

                    <button type="submit">Post Reply</button>
                </fieldset>
            </form>
        </section>
    </main>

</body>
</html>
