<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Resources</title>
</head>
<body>

    <header>
        <h1>Manage Course Resources</h1>
        <a href="list.html">View Resources</a>
    </header>

    <main>
        <section>
            <h2 id="form-title">Add Resource</h2>

            <form id="resource-form">
                <input type="hidden" id="resource-id">

                <label for="resource-title">Title</label>
                <br>
                <input type="text" id="resource-title" required>
                <br><br>

                <label for="resource-description">Description</label>
                <br>
                <textarea id="resource-description" required></textarea>
                <br><br>

                <label for="resource-link">Link</label>
                <br>
                <input type="url" id="resource-link" required>
                <br><br>

                <button type="submit">Save Resource</button>
                <button type="button" id="cancel-edit-btn">Cancel</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>Existing Resources</h2>

            <div id="admin-resources-container">
                Loading resources...
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
