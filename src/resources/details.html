<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Resource Details</title>

    <script src="details.js" defer></script>

</head>

<body>

    <header>

        <h1 id="resource-title">Resource Details</h1>

        <a href="list.html">Back to Resources</a>

    </header>

    <main>

        <section id="resource-info">

            <p id="resource-description">Loading resource description...</p>

            <a id="resource-link" href="#" target="_blank">Open Resource</a>

        </section>

        <section id="discussion-forum">

            <h2>Discussion</h2>

            <div id="comment-list">

                Loading comments...

            </div>

            <form id="comment-form">

                <fieldset>

                    <legend>Add a Comment</legend>

                    <label for="new-comment">Comment</label>

                    <br>

                    <textarea id="new-comment" required></textarea>

                    <br>

                    <button type="submit">Submit Comment</button>

                </fieldset>

            </form>

        </section>

    </main>

</body>

</html>
