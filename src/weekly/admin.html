<!--
  Requirement: Create the Admin View for the Weekly Breakdown

  Instructions:
  Fill in the HTML elements as described in the comments.
  This page allows the teacher (admin) to perform full CRUD operations
  on the weekly course content.
-->
<!DOCTYPE html>
<html lang="en">
<head>
     <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Custom CSS (optional) -->
    <link rel="stylesheet" href="styles.css">

    <!-- Page title -->
    <title>Manage Weekly Breakdown</title>

    

    <!-- Required admin.js script -->
    <script src="admin.js" defer></script>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Manage Weekly Breakdown</h1>
    </header>

    <main>

        <!-- ============================================================
             Section 1: Add / Edit Week Form
             ============================================================ -->
        <section>
            <h2>Add a New Week</h2>

            <form id="week-form" action="#">
                <fieldset>
                    <legend>Weekly Details</legend>

                    <!-- Week Title -->
                    <div>
                        <label for="week-title">Week Title</label>
                        <input type="text" id="week-title" placeholder="Week 1: Introduction to HTML" required>
                    </div>

                    <!-- Start Date -->
                    <div>
                        <label for="week-start-date">Start Date</label>
                        <input type="date" id="week-start-date" required>
                    </div>

                    <!-- Week Description -->
                    <div>
                        <label for="week-description">Week Description</label>
                        <textarea id="week-description" rows="5" placeholder="Enter week description..."></textarea>
                    </div>

                    <!-- Resource Links -->
                    <div>
                        <label for="week-links">Resource Links (one URL per line)</label>
                        <textarea id="week-links" rows="3" placeholder="https://example.com/resource1"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="add-week">Add Week</button>
                </fieldset>
            </form>
        </section>

        <!-- ============================================================
             Section 2: Existing Weekly Entries
             ============================================================ -->
        <section>
            <h2>Current Weekly Breakdown</h2>

            <table id="weeks-table">
                <thead>
                    <tr>
                        <th>Week Title</th>
                        <th>Start Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="weeks-tbody">
                    <!-- Rows will be dynamically injected by admin.js -->
                </tbody>
            </table>
          </section>
    </main>  
</body>
</html>
