<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title -->
    <title>Week Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- JS -->
    <script src="details.js" defer></script>
</head>

<body class="container my-4">

    <!-- Header -->
    <header class="mb-5 text-center">
        <h1 id="week-title"></h1>
    </header>

    <main>

        <!-- ===================== Weekly Info ===================== -->
        <article class="mb-5">

            <p id="week-start-date" class="text-muted"></p>

            <h2>Description & Notes</h2>
            <p id="week-description"></p>

            <h2 class="mt-4">Exercises & Resources</h2>
            <ul id="week-links-list" class="list-group">
                <!-- links injected  -->
            </ul>

        </article>

        <!-- ===================== Discussion ===================== -->
        <section id="discussion-forum">

            <h2>Discussion</h2>

            <!-- Comments -->
            <div id="comment-list" class="mb-4">
                <!-- comments injected -->
            </div>

            <!-- Form -->
            <form id="comment-form" action="#">
                <fieldset class="border p-3">
                    <legend class="w-auto">Leave a Comment</legend>

                    <div class="mb-3">
                        <label for="new-comment" class="form-label">Your Comment</label>
                        <textarea id="new-comment" class="form-control" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Post Comment
                    </button>
                </fieldset>
            </form>

        </section>

    </main>

</body>
</html>
